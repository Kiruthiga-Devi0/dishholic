{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ recipe.name }} | Cooking Show</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;overflow:hidden;font-family:Arial,sans-serif;background:#120d0a;color:#fff}
#ui{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 20px;background:linear-gradient(to bottom,rgba(0,0,0,.68),rgba(0,0,0,0));display:flex;justify-content:space-between;align-items:center}
#title{font-size:18px;color:#ffe5c2;text-shadow:0 2px 10px rgba(0,0,0,.5)}
#stepText{position:fixed;left:50%;top:86px;transform:translateX(-50%);z-index:25;padding:14px 18px;border-radius:14px;background:rgba(24,15,10,.62);border:1px solid rgba(255,214,165,.16);color:#fff;font-size:20px;max-width:82vw;text-align:center;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,.25)}
#controls{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:25;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(32,20,14,.7);color:#ffdca8;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.24)}
button:hover{background:rgba(255,197,120,.16)}
#canvasWrap{position:fixed;left:0;top:0;width:100%;height:100%}
#debug{position:fixed;left:10px;bottom:10px;z-index:30;font-size:12px;color:#ffe8c8;background:rgba(0,0,0,.35);padding:6px 8px;border-radius:8px}
</style>
</head>
<body>

{{ recipe.steps|json_script:"recipe-steps" }}

<div id="ui">
  <div id="title">{{ recipe.name }} </div>
  <div id="progressUI">0%</div>
</div>

<div id="stepText">Loading...</div>

<div id="controls">
  <button onclick="togglePlay()">Play / Pause</button>
  <button onclick="restartShow()">Restart</button>
  <button onclick="nextScene()">Next Scene</button>
</div>

<div id="canvasWrap"></div>
<div id="debug">Ready</div>

let synth = window.speechSynthesis, voices=[], speaking=false, currentUtterance=null, milkPouring=false;

const stepText = document.getElementById('stepText');
const progressUI = document.getElementById('progressUI');
const debug = document.getElementById('debug');

function loadVoices(){ if(synth) voices=synth.getVoices(); }
if(synth){ loadVoices(); synth.onvoiceschanged=loadVoices; }
function stopVoice(){ if(!synth) return; synth.cancel(); currentUtterance=null; speaking=false; awaitingVoice=false; }
function speakText(text,onDone){ if(!synth||!text){ stepSpeechDone=true; if(typeof onDone==='function') onDone(); return; } stopVoice(); currentUtterance=new SpeechSynthesisUtterance(text); currentUtterance.lang='en-US'; currentUtterance.rate=0.95; currentUtterance.pitch=1; currentUtterance.volume=1; if(!voices.length) loadVoices(); if(voices.length) currentUtterance.voice=voices[0]; speaking=true; awaitingVoice=true; stepSpeechDone=false; currentUtterance.onend=()=>{ speaking=false; awaitingVoice=false; stepSpeechDone=true; currentUtterance=null; if(typeof onDone==='function') onDone(); }; currentUtterance.onerror=()=>{ speaking=false; awaitingVoice=false; stepSpeechDone=true; currentUtterance=null; if(typeof onDone==='function') onDone(); }; synth.speak(currentUtterance); }

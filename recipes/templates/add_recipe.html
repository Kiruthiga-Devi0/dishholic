{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Recipe | DISHHOLIC</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
min-height:100vh;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
color:white;
padding:20px;
box-sizing:border-box;
}

/* CONTAINER */
.container{
width:100%;
max-width:450px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
box-shadow:0 0 30px rgba(0,255,255,0.3);
border:1px solid rgba(255,255,255,0.2);
}

/* TITLE */
h2{
text-align:center;
margin-bottom:25px;
color:#00ffff;
letter-spacing:1px;
font-size:22px;
}

/* FORM */
label{
font-size:14px;
display:block;
margin-bottom:4px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
font-size:14px;
}

/* TEXTAREA */
textarea{
height:90px;
resize:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f2fe,#4facfe);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00f2fe;
}

/* BACK LINK */
.back{
margin-top:15px;
text-align:center;
}

.back a{
color:#00ffff;
text-decoration:none;
font-size:14px;
}

.back a:hover{
text-decoration:underline;
}

/* -------------------- */
/* 📱 MOBILE */
/* -------------------- */
@media (max-width:600px){

.container{
padding:20px;
border-radius:15px;
}

h2{
font-size:20px;
}

input, textarea, select{
font-size:13px;
padding:8px;
}

button{
font-size:14px;
padding:10px;
}

}

/* -------------------- */
/* 📲 TABLET */
/* -------------------- */
@media (min-width:601px) and (max-width:1024px){

.container{
max-width:500px;
}

h2{
font-size:22px;
}

}

/* -------------------- */
/* 💻 LAPTOP / DESKTOP */
/* -------------------- */
@media (min-width:1025px){

.container{
max-width:450px;
}

h2{
font-size:24px;
}

input, textarea, select{
font-size:15px;
}

button{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<h2> Add Recipe</h2>

<form method="POST">
{% csrf_token %}

<label>Recipe Name</label>
<input type="text" name="name" required>

<label>Ingredients</label>
<textarea name="ingredients" placeholder="Example: rice, salt, water"></textarea>

<label>Steps (JSON format)</label>
<textarea name="steps" placeholder='["Boil water","Add rice","Cook for 10 minutes"]'></textarea>

<label>Duration (minutes)</label>
<input type="number" name="duration">

<label>Difficulty</label>
<select name="difficulty">
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>
</select>

<button type="submit">
<i class="fa-solid fa-plus"></i> Add Recipe
</button>

</form>

<div class="back">
<a href="/dashboard/">← Back to Dashboard</a>
</div>

</div>

</body>
</html>

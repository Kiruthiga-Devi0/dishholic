{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔥 VERY IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | DISHHOLIC</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f7fb;
}

/* NAVBAR */
.navbar{
    background:#13adad;
    color:white;
    padding:12px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LEFT SIDE */
.nav-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    height:40px;
}

.nav-left h2{
    margin:0;
    font-size:22px;
    color:white;
}

/* RIGHT SIDE */
.nav-links{
    display:flex;
    gap:15px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:6px;
    transition:0.3s;
}

.nav-links a:hover{
    background:rgba(255,255,255,0.2);
}

/* PROFILE CARD */
.container{
    max-width:600px;
    width:90%;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    text-align:center;
}

.profile-pic{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#13adad;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
    margin:0 auto 15px;
}

h2{
    color:#13adad;
    margin:10px 0;
}

.info{
    margin-top:15px;
    text-align:left;
}

.info p{
    padding:10px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.logout-btn{
    display:inline-block;
    margin-top:20px;
    background:#13adad;
    color:white;
    padding:10px 18px;
    border-radius:6px;
    text-decoration:none;
}

.logout-btn:hover{
    background:#0b7a75;
}

/* ===================== */
/* 📱 MOBILE VIEW */
/* ===================== */
@media (max-width:768px){

    .navbar{
        flex-direction:column;
        align-items:flex-start;
        padding:12px 20px;
    }

    .nav-links{
        width:100%;
        flex-direction:column;   /* 🔥 STACK */
        gap:10px;
        margin-top:10px;
    }

    .nav-links a{
        width:100%;
        text-align:center;
        background:rgba(255,255,255,0.1);
    }

    .container{
        margin:25px auto;
        padding:20px;
    }

    .profile-pic{
        width:70px;
        height:70px;
        font-size:28px;
    }

    h2{
        font-size:20px;
    }
}

/* 📱 SMALL MOBILE */
@media (max-width:480px){

    .nav-left h2{
        font-size:18px;
    }

    .container{
        padding:15px;
    }

    .logout-btn{
        width:100%;
        text-align:center;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <img src="{% static 'recipes/images/DISHHOLIC.png' %}" class="logo">
        <h2>DISHHOLIC</h2>
    </div>

    <div class="nav-links">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'recipes' %}">Recipes</a>
        <a href="{% url 'favorites' %}">Favorites</a>
    </div>

</div>

<!-- PROFILE -->
<div class="container">

    <div class="profile-pic">
        {{ user.username|first|upper }}
    </div>

    <h2>{{ user.username }}</h2>

    <div class="info">
        <p><strong>Username:</strong> {{ user.username }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Joined:</strong> {{ user.date_joined }}</p>
    </div>

    <a href="{% url 'logout' %}" class="logout-btn">Logout</a>

</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes | DISHHOLIC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
}

/* NAVBAR */
.navbar {
    background: #13adad;
    color: white;
    padding: 12px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

/* LEFT SIDE */
.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    height: 40px;
}

.navbar h2 {
    margin: 0;
    font-size: 22px;
}

/* NAV LINKS */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 6px;
    transition: 0.3s;
    font-size: 14px;
}

.nav-links a:hover {
    background: rgba(255,255,255,0.2);
}

.nav-links a.active {
    background: white;
    color: #13adad;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.container h1 {
    font-size: 28px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.recipe-link {
    text-decoration: none;
    color: inherit;
    display: block;
    padding: 15px;
}

.recipe-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    text-align: center;
    margin-top: 12px;
    color: #13adad;
    font-size: 18px;
}

/* HEART */
.heart-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 24px;
    color: #fff;
    background: rgba(0,0,0,0.4);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
}

.heart-btn.favorited {
    color: red;
}

.heart-btn:hover {
    transform: scale(1.2);
}

/* ================== RESPONSIVE ================== */

/* TABLET */
@media (max-width: 768px) {

    .navbar {
        padding: 12px 20px;
    }

    .navbar h2 {
        font-size: 18px;
    }

    .logo {
        height: 32px;
    }

    .nav-links {
        gap: 10px;
    }

    .nav-links a {
        padding: 6px 10px;
        font-size: 12px;
    }

    .container {
        padding: 25px 15px;
    }

    .container h1 {
        font-size: 24px;
    }

    .recipe-img {
        height: 160px;
    }
}

/* MOBILE */
@media (max-width: 480px) {

    .navbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .nav-left {
        width: 100%;
    }

    .nav-links {
        width: 100%;
        justify-content: space-between;
    }

    .nav-links a {
        flex: 1;
        text-align: center;
        padding: 8px 5px;
        font-size: 11px;
    }

    .container h1 {
        font-size: 20px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .recipe-img {
        height: 150px;
    }

    .card h3 {
        font-size: 16px;
    }

    .heart-btn {
        width: 36px;
        height: 36px;
        font-size: 20px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <img src="{% static 'recipes/images/DISHHOLIC.png' %}" class="logo">
        <h2>DISHHOLIC</h2>
    </div>

    <div class="nav-links">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'recipes' %}" class="active">Recipes</a>
        <a href="{% url 'favorites' %}">Favorites</a>
    </div>

</div>

<div class="container">
    <h1>Recipes</h1>

    <div class="grid">
        {% for recipe in recipes %}
        <div class="card">

            <a href="{% url 'recipe_detail' recipe.id %}" class="recipe-link">

                <img src="{{ recipe.image_url|default:'https://via.placeholder.com/400x300?text=No+Image' }}"
                     onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'"
                     class="recipe-img">

                <h3>{{ recipe.name }}</h3>

            </a>

            <form method="POST" action="{% url 'toggle_favorite' recipe.id %}" class="heart-form">
                {% csrf_token %}
                <button type="submit"
                    class="heart-btn {% if recipe in user.favorite_recipes.all %}favorited{% endif %}">
                    ♥
                </button>
            </form>

        </div>
        {% endfor %}
    </div>
</div>

<script>
document.querySelectorAll('.heart-form').forEach(form => {
    form.addEventListener('submit', async function(e){
        e.preventDefault();
        const btn = form.querySelector('.heart-btn');
        const url = form.action;
        const csrf = form.querySelector('[name=csrfmiddlewaretoken]').value;

        const res = await fetch(url, {
            method:'POST',
            headers:{ 'X-CSRFToken': csrf }
        });

        if(res.ok){
            btn.classList.toggle('favorited');
        }
    });
});
</script>

</body>
</html>
